<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>M3U8 Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #222;
    --accent: #3b82f6;
    --text: #eee;
    --text-dim: #666;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  .app {
    max-width: 600px;
    margin: 0 auto;
    padding: 0 16px;
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
  }

  /* ── Header ── */
  .header {
    padding: 16px 0 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header h1 {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .header .dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── Player ── */
  .player-box {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 16px;
  }

  .player-box video {
    width: 100%; height: 100%;
    display: block;
    background: #000;
  }

  .player-mask {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; background: #111;
    transition: opacity 0.3s; z-index: 2;
  }
  .player-mask.hidden { opacity: 0; pointer-events: none; }

  .player-mask .icon {
    width: 40px; height: 40px;
    border: 2px solid #333; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .player-mask .icon svg { width: 16px; height: 16px; fill: #555; margin-left: 2px; }
  .player-mask span { font-size: 0.72rem; color: #444; }

  .player-loader {
    position: absolute; inset: 0;
    display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.5); z-index: 3;
  }
  .player-loader.active { display: flex; }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid rgba(255,255,255,0.08);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Mode Toggle ── */
  .mode-bar {
    display: flex;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 4px;
    margin-bottom: 12px;
    gap: 4px;
  }

  .mode-btn {
    flex: 1;
    padding: 10px 0;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-dim);
    background: transparent;
    border: none;
    border-radius: calc(var(--radius) - 4px);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .mode-btn.active {
    background: var(--accent);
    color: #fff;
  }

  .mode-btn svg {
    width: 14px; height: 14px;
    fill: currentColor;
  }

  /* ── Input Area ── */
  .input-area {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 12px;
  }

  .input-area.hidden { display: none; }

  .field-label {
    font-size: 0.65rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .field-input {
    display: block;
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.84rem;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  .field-input:focus { border-color: var(--accent); }
  .field-input::placeholder { color: #333; }

  .field-textarea {
    display: block;
    width: 100%;
    min-height: 200px;
    resize: vertical;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    color: var(--text);
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.74rem;
    line-height: 1.6;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  .field-textarea:focus { border-color: var(--accent); }
  .field-textarea::placeholder { color: #333; }

  .field-hint {
    font-size: 0.68rem;
    color: var(--text-dim);
    margin-top: 6px;
    opacity: 0.6;
  }

  /* ── Actions ── */
  .actions {
    display: flex;
    gap: 10px;
  }

  .btn {
    flex: 1;
    padding: 13px 0;
    font-family: inherit;
    font-size: 0.84rem;
    font-weight: 500;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-play {
    background: var(--accent);
    color: #fff;
  }

  .btn-play:active { transform: scale(0.97); opacity: 0.85; }

  .btn-stop {
    background: var(--surface);
    color: var(--text-dim);
    border: 1px solid var(--border);
    flex: 0 0 80px;
  }

  .btn-stop:active { transform: scale(0.97); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
    left: 16px; right: 16px;
    max-width: 568px;
    margin: 0 auto;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 0.78rem;
    opacity: 0;
    transform: translateY(12px);
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 999;
    word-break: break-all;
  }

  .toast.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .toast.error {
    background: #1a1111;
    border: 1px solid #3d1f1f;
    color: #f87171;
  }

  .toast.ok {
    background: #111a11;
    border: 1px solid #1f3d1f;
    color: #4ade80;
  }

  @media (min-width: 601px) {
    .app { padding-top: 20px; }
    .player-box { border-radius: 12px; }
  }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="dot"></div>
    <h1>M3U8 Player</h1>
  </header>

  <div class="player-box">
    <video id="video" controls playsinline></video>
    <div class="player-mask" id="mask">
      <div class="icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <span>等待输入</span>
    </div>
    <div class="player-loader" id="loader"><div class="spinner"></div></div>
  </div>

  <div class="mode-bar">
    <button class="mode-btn active" onclick="switchMode('url',this)">
      <svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
      URL
    </button>
    <button class="mode-btn" onclick="switchMode('text',this)">
      <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
      M3U8
    </button>
  </div>

  <!-- URL mode -->
  <div class="input-area" id="area-url">
    <div class="field-label">M3U8 链接</div>
    <input type="text" class="field-input" id="inp-url" placeholder="https://example.com/stream.m3u8" spellcheck="false" autocomplete="off" inputmode="url">
  </div>

  <!-- Text mode -->
  <div class="input-area hidden" id="area-text">
    <div class="field-label">M3U8 文本</div>
    <textarea class="field-textarea" id="inp-text" placeholder="#EXTM3U&#10;#EXT-X-VERSION:3&#10;#EXT-X-KEY:METHOD=AES-128,URI=&quot;https://...&quot;,IV=0x00000000000000000000000000000000&#10;#EXTINF:8.333,&#10;https://...00000.ts&#10;#EXT-X-ENDLIST"></textarea>
    <div class="field-hint">所有 URI 须为完整绝对地址</div>
  </div>

  <div class="actions">
    <button class="btn btn-play" id="btnPlay">播放</button>
    <button class="btn btn-stop" id="btnStop">停止</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  'use strict';

  var video   = document.getElementById('video');
  var mask    = document.getElementById('mask');
  var loader  = document.getElementById('loader');
  var toastEl = document.getElementById('toast');
  var inpUrl  = document.getElementById('inp-url');
  var inpText = document.getElementById('inp-text');
  var btnPlay = document.getElementById('btnPlay');
  var btnStop = document.getElementById('btnStop');

  var hls = null;
  var mode = 'url';
  var toastTimer = null;
  var blobUrls = [];

  /* Mode switch */
  window.switchMode = function (name, btn) {
    mode = name;
    var btns = document.querySelectorAll('.mode-btn');
    for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
    btn.classList.add('active');

    var areas = document.querySelectorAll('.input-area');
    for (var j = 0; j < areas.length; j++) areas[j].classList.add('hidden');
    document.getElementById('area-' + name).classList.remove('hidden');
  };

  /* Toast */
  function showToast(msg, type) {
    toastEl.textContent = msg;
    toastEl.className = 'toast ' + (type || 'error') + ' visible';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toastEl.classList.remove('visible'); }, 5000);
  }

  function showLoading(on) { loader.classList.toggle('active', on); }

  function cleanup() {
    if (hls) { hls.destroy(); hls = null; }
    for (var i = 0; i < blobUrls.length; i++) URL.revokeObjectURL(blobUrls[i]);
    blobUrls = [];
  }

  /* HLS core */
  function onParsed() {
    showLoading(false);
    mask.classList.add('hidden');
    video.play().catch(function () {});
  }

  function onError(evt, data) {
    if (!data.fatal) return;
    if (data.type === 'networkError') {
      showToast('网络错误：' + (data.details || ''), 'error');
      if (hls) hls.startLoad();
    } else if (data.type === 'mediaError') {
      showToast('解码错误，尝试恢复...', 'error');
      if (hls) hls.recoverMediaError();
    } else {
      showToast('播放失败：' + (data.details || '未知'), 'error');
      cleanup(); showLoading(false);
    }
  }

  function bindHls(h) {
    h.on(Hls.Events.MANIFEST_PARSED, onParsed);
    h.on(Hls.Events.ERROR, onError);
  }

  function playUrl(url) {
    cleanup();
    showLoading(true);
    mask.classList.remove('hidden');

    if (Hls.isSupported()) {
      hls = new Hls({ maxBufferLength: 30 });
      hls.loadSource(url);
      hls.attachMedia(video);
      bindHls(hls);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.addEventListener('loadedmetadata', function fn() {
        video.removeEventListener('loadedmetadata', fn);
        mask.classList.add('hidden'); showLoading(false);
        video.play().catch(function () {});
      });
    } else {
      showLoading(false);
      showToast('浏览器不支持 HLS', 'error');
    }
  }

  function playText(text) {
    cleanup();
    showLoading(true);
    mask.classList.remove('hidden');

    if (!Hls.isSupported()) {
      showLoading(false);
      showToast('文本模式需要现代浏览器', 'error');
      return;
    }

    var blob    = new Blob([text], { type: 'application/vnd.apple.mpegurl' });
    var blobUrl = URL.createObjectURL(blob);
    blobUrls.push(blobUrl);

    hls = new Hls({ maxBufferLength: 30 });
    hls.loadSource(blobUrl);
    hls.attachMedia(video);
    bindHls(hls);
  }

  /* Play */
  btnPlay.addEventListener('click', function () {
    if (mode === 'url') {
      var url = inpUrl.value.trim();
      if (!url) { showToast('请输入链接', 'error'); return; }
      playUrl(url);
    } else {
      var txt = inpText.value.trim();
      if (!txt) { showToast('请粘贴 M3U8 文本', 'error'); return; }
      if (txt.indexOf('#EXTM3U') === -1) {
        showToast('缺少 #EXTM3U 标记', 'error');
        return;
      }
      playText(txt);
    }
  });

  /* Stop */
  btnStop.addEventListener('click', function () {
    cleanup();
    video.removeAttribute('src');
    video.load();
    mask.classList.remove('hidden');
    showLoading(false);
  });

  /* Enter to play */
  inpUrl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') btnPlay.click();
  });

  /* Video state */
  video.addEventListener('playing', function () { showLoading(false); });
  video.addEventListener('waiting', function () { showLoading(true); });
  video.addEventListener('canplay', function () { showLoading(false); });

  /* Auto-hide mask on first touch of video */
  video.addEventListener('play', function () { mask.classList.add('hidden'); });
  
})();
</script>

</body>
</html>
